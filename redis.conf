# Redis 配置文件
# 用于 dedup 项目的文件去重功能

################################## NETWORK #####################################

# 绑定地址，0.0.0.0 表示接受所有网络接口的连接
bind 0.0.0.0

# 端口号
port 6379

# TCP 监听 backlog
tcp-backlog 511

# 超时时间（秒），0 表示禁用
timeout 0

# TCP keepalive
tcp-keepalive 300

################################## GENERAL #####################################

# 以 daemon 方式运行（Docker 中应设置为 no）
daemonize no

#  supervised 选项
supervised no

# PID 文件
pidfile /var/run/redis_6379.pid

# 日志级别：debug, verbose, notice, warning
loglevel notice

# 日志文件路径，空字符串表示输出到 stdout（Docker 推荐）
logfile ""

# 数据库数量
databases 16

# 始终显示 Logo
always-show-logo yes

# 警告配置
set-proc-title yes
proc-title-template "{title} {listen-addr} {server-mode}"

################################ SNAPSHOTTING  ################################

# RDB 持久化配置
# save <seconds> <changes>
# 900 秒内至少 1 个 key 改变
save 900 1
# 300 秒内至少 10 个 key 改变
save 300 10
# 60 秒内至少 10000 个 key 改变
save 60 10000

# 如果 RDB 快照失败，是否停止写入
stop-writes-on-bgsave-error yes

# 是否压缩 RDB 文件
rdbcompression yes

# RDB 文件校验和
rdbchecksum yes

# RDB 文件名
dbfilename dump.rdb

# RDB 文件目录
dir /data

################################# REPLICATION #################################

# 主从复制配置（当前为单机模式，无需配置）
# replicaof <masterip> <masterport>

################################## SECURITY ###################################

# 密码认证（生产环境建议设置）
# requirepass your_password_here

# 命令重命名或禁用（安全加固）
# rename-command FLUSHDB ""
# rename-command FLUSHALL ""
# rename-command DEBUG ""

################################### CLIENTS ####################################

# 最大客户端连接数
maxclients 10000

############################## MEMORY MANAGEMENT ################################

# 最大内存限制（根据实际需求调整）
# maxmemory <bytes>

# 内存淘汰策略
# maxmemory-policy noeviction

############################# LAZY FREEING ####################################

# 惰性删除配置
lazyfree-lazy-eviction no
lazyfree-lazy-expire no
lazyfree-lazy-server-del no
replica-lazy-flush no
lazyfree-lazy-user-del no

############################## APPEND ONLY MODE ###############################

# AOF 持久化开关
appendonly yes

# AOF 文件名
appendfilename "appendonly.aof"

# AOF 持久化策略
# always: 每次写操作都同步（最安全，性能最低）
# everysec: 每秒同步一次（推荐，平衡安全性和性能）
# no: 由操作系统决定何时同步（性能最高，安全性最低）
appendfsync everysec

# AOF 重写期间是否禁用 fsync
no-appendfsync-on-rewrite no

# AOF 自动重写触发条件
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# AOF 加载截断
aof-load-truncated yes

# AOF 使用 RDB 前缀
aof-use-rdb-preamble yes

################################ LUA SCRIPTING  ###############################

# Lua 脚本最大执行时间（毫秒）
lua-time-limit 5000

################################ REDIS CLUSTER  ###############################

# 集群模式（当前禁用）
# cluster-enabled yes

################################## SLOW LOG ###################################

# 慢查询日志阈值（微秒），10000 = 10ms
slowlog-log-slower-than 10000

# 慢查询日志最大长度
slowlog-max-len 128

################################ LATENCY MONITOR ##############################

# 延迟监控阈值（毫秒），0 表示禁用
latency-monitor-threshold 0

############################# EVENT NOTIFICATION ##############################

# Keyspace 事件通知
# notify-keyspace-events ""

############################### ADVANCED CONFIG ###############################

# Hash 配置
hash-max-listpack-entries 128
hash-max-listpack-value 64

# List 配置
list-max-listpack-size -2
list-compress-depth 0

# Set 配置
set-max-intset-entries 512

# ZSet 配置
zset-max-listpack-entries 128
zset-max-listpack-value 64

# HLL 配置
hll-sparse-max-bytes 3000

# Stream 配置
stream-node-max-bytes 4096
stream-node-max-entries 100

# Active rehashing
activerehashing yes

# Client output buffer limits
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# Hz 频率
hz 10

# Dynamic hz
dynamic-hz yes

# AOF 重写时启用增量 fsync
aof-rewrite-incremental-fsync yes

# RDB 保存时启用增量 fsync
rdb-save-incremental-fsync yes

# jemalloc 后台线程
jemalloc-bg-thread yes
