name: dedup-redis
services:
  redis:
    image: redis:latest
    container_name: dedup-redis
    ports:
      - "6379:6379"
    volumes:
      - ./redis-data:/data
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --save 60 10000
    restart: unless-stopped
